<title>The Polite Exit</title>
<style>
/* ==========================================================
   BRAND TOKENS — EDIT HERE TO CHANGE COLORS
   Skills Bank palette (swap these hex values for a new brand kit)
   ========================================================== */
:root{
  --navy:#080828;
  --blue:#4D88E8;
  --orange:#F26A44;
  --yellow:#FFBC3A;
  --teal:#40BDA9;
  --ink:#1B1C2B;
  --paper:#FFFFFF;
  --bg:#F6F7FB;
  --line:#E2E5EF;
  --muted:#6B6E85;
  --strong-bg:#E9F7F3;
  --strong-line:#40BDA9;
  --partial-bg:#FFF6E2;
  --partial-line:#FFBC3A;
  --risky-bg:#FDECE8;
  --risky-line:#F26A44;
  --radius:14px;
  --shadow:0 2px 10px rgba(8,8,40,0.07);
  --font-en:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
  --font-ar:'Tahoma','Segoe UI',Arial,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-en);
  line-height:1.5;
  min-height:100vh;
}
body[dir="rtl"]{font-family:var(--font-ar);}
.app{max-width:900px;margin:0 auto;padding:24px 20px 60px;}
h1,h2,h3{margin:0 0 8px;color:var(--navy);}
h1{font-size:1.6rem;} h2{font-size:1.3rem;} h3{font-size:1.05rem;}
p{margin:0 0 12px;}
button{font-family:inherit;font-size:1rem;cursor:pointer;}
.hidden{display:none !important;}
a{color:var(--blue);}

/* focus visibility */
button:focus-visible, [tabindex]:focus-visible, a:focus-visible{
  outline:3px solid var(--blue);
  outline-offset:2px;
}

/* header / brand bar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:var(--paper);border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:10px;}
.brand svg{height:30px;width:auto;display:block;}
.brand-name{font-weight:700;color:var(--navy);font-size:1.05rem;}
.lang-toggle{
  display:flex;gap:6px;background:var(--bg);border-radius:999px;padding:4px;border:1px solid var(--line);
}
.lang-toggle button{
  border:none;background:transparent;padding:6px 14px;border-radius:999px;color:var(--muted);font-weight:600;
}
.lang-toggle button[aria-pressed="true"]{background:var(--navy);color:#fff;}

/* progress bar */
.progress-wrap{margin:20px 0 8px;}
.progress-label{font-size:0.85rem;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;}
.progress-track{height:10px;border-radius:999px;background:var(--line);overflow:hidden;}
.progress-fill{height:100%;background:var(--teal);border-radius:999px;transition:width .4s ease;}
@media (prefers-reduced-motion: reduce){.progress-fill{transition:none;}}

/* generic card */
.card{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px;box-shadow:var(--shadow);margin-bottom:16px;
}

/* language select screen */
.lang-screen{text-align:center;padding:60px 20px;}
.lang-screen .card{max-width:460px;margin:0 auto;padding:36px 28px;}
.lang-options{display:flex;gap:14px;justify-content:center;margin-top:20px;}
.lang-options button{
  flex:1;padding:16px;border-radius:var(--radius);border:2px solid var(--line);
  background:var(--paper);font-weight:700;font-size:1.05rem;color:var(--navy);
}
.lang-options button:hover{border-color:var(--blue);}

/* model diagram */
.model-flow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;margin:18px 0;}
.model-step-btn{
  padding:14px 18px;border-radius:12px;border:2px solid var(--line);background:var(--paper);
  font-weight:700;color:var(--navy);min-width:110px;
}
.model-step-btn.acknowledge{border-color:var(--blue);}
.model-step-btn.bridge{border-color:var(--teal);}
.model-step-btn.confirm{border-color:var(--orange);}
.model-step-btn.close{border-color:var(--yellow);}
.model-step-btn[aria-pressed="true"]{background:var(--navy);color:#fff;}
.model-arrow{color:var(--muted);font-size:1.3rem;}
.step-detail{background:var(--bg);border-radius:10px;padding:16px;margin-top:10px;}
.step-detail dl{margin:0;}
.step-detail dt{font-weight:700;color:var(--navy);margin-top:10px;}
.step-detail dt:first-child{margin-top:0;}
.step-detail dd{margin:2px 0 0;color:var(--ink);}

/* order-building tutorial */
.order-pool{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0;}
.order-pool button{padding:10px 16px;border-radius:10px;border:1px solid var(--line);background:var(--paper);font-weight:600;}
.order-built{display:flex;flex-wrap:wrap;gap:8px;min-height:48px;padding:10px;background:var(--bg);border-radius:10px;margin-bottom:10px;align-items:center;}
.order-built .chip{background:var(--navy);color:#fff;padding:8px 14px;border-radius:999px;font-weight:600;font-size:0.9rem;}

/* generic option list (classify / MCQ) */
.option-list{display:flex;flex-direction:column;gap:10px;margin:14px 0;}
.option-btn{
  text-align:start;padding:14px 16px;border-radius:12px;border:1.5px solid var(--line);background:var(--paper);
  font-size:1rem;color:var(--ink);
}
.option-btn:hover{border-color:var(--blue);}
.option-btn.selected-correct{background:var(--strong-bg);border-color:var(--strong-line);}
.option-btn.selected-incorrect{background:var(--risky-bg);border-color:var(--risky-line);}

.feedback-box{border-radius:12px;padding:14px 16px;margin-top:10px;font-size:0.95rem;}
.feedback-box.good{background:var(--strong-bg);border:1px solid var(--strong-line);}
.feedback-box.bad{background:var(--risky-bg);border:1px solid var(--risky-line);}

.nav-row{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
.btn{
  padding:11px 20px;border-radius:10px;border:none;font-weight:700;
}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:#14142f;}
.btn-secondary{background:var(--paper);color:var(--navy);border:1.5px solid var(--line);}
.btn-secondary:hover{border-color:var(--blue);}
.btn-ghost{background:transparent;color:var(--muted);border:1px dashed var(--line);}

/* journey / scenario list */
.journey-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.scenario-card{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px;
  display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow);
}
.scenario-card .tag{
  display:inline-flex;align-items:center;gap:6px;font-size:0.78rem;font-weight:700;color:var(--navy);
  background:var(--bg);padding:4px 10px;border-radius:999px;width:fit-content;
}
.scenario-card.completed{border-color:var(--teal);}
.scenario-card.completed .tag{background:var(--strong-bg);color:#1a6e5f;}

/* scenario play screen */
.channel-badge{
  display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;
  font-size:0.85rem;font-weight:700;margin-bottom:14px;
}
.channel-phone{background:#E8EEFC;color:var(--blue);}
.channel-face{background:#FDEFE9;color:var(--orange);}
.customer-line{
  background:var(--bg);border-inline-start:4px solid var(--blue);border-radius:0 10px 10px 0;
  padding:14px 16px;margin:14px 0;font-style:italic;
}
body[dir="rtl"] .customer-line{border-inline-start:4px solid var(--blue);}

.direction-indicator{
  display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:0.9rem;
  padding:6px 14px;border-radius:999px;margin-bottom:10px;
}
.dir-good{background:var(--strong-bg);color:#1a6e5f;}
.dir-mid{background:var(--partial-bg);color:#8a5a05;}
.dir-bad{background:var(--risky-bg);color:#a13c1f;}

/* results */
.capability-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);}
.capability-row:last-child{border-bottom:none;}
.capability-label{font-weight:700;color:var(--navy);}
.capability-tag{padding:4px 12px;border-radius:999px;font-size:0.82rem;font-weight:700;}
.tag-strong{background:var(--strong-bg);color:#1a6e5f;}
.tag-dev{background:var(--partial-bg);color:#8a5a05;}
.tag-needs{background:var(--risky-bg);color:#a13c1f;}

.summary-stats{display:flex;gap:14px;flex-wrap:wrap;margin:16px 0;}
.stat-box{flex:1;min-width:140px;background:var(--bg);border-radius:12px;padding:14px;text-align:center;}
.stat-box .num{font-size:1.6rem;font-weight:800;color:var(--navy);}
.stat-box .lbl{font-size:0.82rem;color:var(--muted);}

.sr-only{
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
  clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

footer.appfoot{text-align:center;color:var(--muted);font-size:0.8rem;margin-top:30px;}

/* RTL specifics */
body[dir="rtl"] .customer-line{border-inline-start:none;border-inline-end:4px solid var(--blue);}
body[dir="rtl"] .option-btn{text-align:right;}
body[dir="rtl"] .nav-row{justify-content:flex-start;}

@media (max-width:560px){
  .app{padding:16px 12px 50px;}
  .model-flow{flex-direction:column;}
  .model-arrow{transform:rotate(90deg);}
  .nav-row{flex-direction:column;}
  .nav-row .btn{width:100%;}
}
</style>

/* ==========================================================
   STATE
   ========================================================== */
const STORAGE_KEY = "politeExit_progress_v1";
const LANG_KEY = "politeExit_lang_v1";

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}
function defaultProgress(){
  return {
    tutorialDone:false,
    completedScenarios:{},      // scenarioId -> true
    firstAttempts:{},           // decisionId -> quality ('strong'|'partial'|'risky')
    improvedAfterRetry:{},      // decisionId -> true
    scenarioScores:{}           // scenarioId -> {firstAttemptStrong:n, improved:n}
  };
}
let progress = loadProgress() || defaultProgress();
function saveProgress(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}

let lang = localStorage.getItem(LANG_KEY) || null;

/* ==========================================================
   HELPERS
   ========================================================== */
function t(key){ return (UI[lang] && UI[lang][key]) || UI.en[key] || key; }
function setLiveStatus(msg){
  const el = document.getElementById("liveStatus");
  el.textContent = "";
  window.setTimeout(()=>{ el.textContent = msg; }, 30);
}
function capLabel(cap){ return t("cap_"+cap); }

function applyLangToDocument(){
  document.documentElement.lang = lang;
  document.body.dir = lang === "ar" ? "rtl" : "ltr";
  document.getElementById("langToggleTop").querySelectorAll("button").forEach(b=>{
    b.setAttribute("aria-pressed", b.dataset.lang === lang ? "true":"false");
  });
  const logo = document.getElementById("brandLogoSvg");
  if(logo) logo.setAttribute("aria-label", lang === "ar" ? "شعار سكيلز بانك" : "Skills Bank logo");
}

function completedCount(){
  return Object.keys(progress.completedScenarios).length;
}
function updateProgressBar(){
  const n = completedCount();
  const pct = Math.round((n/6)*100);
  const fill = document.getElementById("progressFill");
  fill.style.width = pct+"%";
  fill.setAttribute("aria-valuenow", String(pct));
  document.getElementById("progressPct").textContent = pct+"%";
  let label;
  if(lang === "ar"){
    label = n>=6 ? "التقدم الكلي — تم استكمال جميع المحادثات"
                 : "التقدم الكلي — تم استكمال "+n+" محادثات من 6";
  }else{
    label = "Overall Progress — "+n+" of 6 conversation"+(n===1?"":"s")+" completed";
  }
  document.getElementById("progressText").textContent = label;
}

/* ==========================================================
   VIEW SWITCHING
   ========================================================== */
function showOnly(id){
  ["screen-tutorial","screen-journey","screen-scenario","screen-scenario-result","screen-final"]
    .forEach(s=>{
      document.getElementById(s).classList.toggle("hidden", s!==id);
    });
}

/* ==========================================================
   LANGUAGE SELECT
   ========================================================== */
document.getElementById("pickEn").addEventListener("click", ()=>chooseLang("en"));
document.getElementById("pickAr").addEventListener("click", ()=>chooseLang("ar"));
document.getElementById("langToggleTop").addEventListener("click", (e)=>{
  const btn = e.target.closest("button[data-lang]");
  if(!btn) return;
  chooseLang(btn.dataset.lang, true);
});

function chooseLang(code, isSwitch){
  lang = code;
  localStorage.setItem(LANG_KEY, code);
  applyLangToDocument();
  document.getElementById("screen-lang").classList.add("hidden");
  document.getElementById("mainWrap").classList.remove("hidden");
  document.getElementById("langToggleTop").style.display = "flex";
  document.getElementById("resetBtn").classList.remove("hidden");
  updateProgressBar();
  if(isSwitch){
    // preserve current state, just re-render current screen
    rerenderCurrentScreen();
  } else {
    if(progress.tutorialDone){ renderJourney(); showOnly("screen-journey"); }
    else { renderTutorial(); showOnly("screen-tutorial"); }
  }
}

let lastScreen = "tutorial";
let lastScenarioId = null;
function rerenderCurrentScreen(){
  if(lastScreen === "tutorial"){ renderTutorial(); showOnly("screen-tutorial"); }
  else if(lastScreen === "journey"){ renderJourney(); showOnly("screen-journey"); }
  else if(lastScreen === "scenario" && lastScenarioId){ startScenario(lastScenarioId); }
  else if(lastScreen === "final"){ renderFinal(); showOnly("screen-final"); }
  else { renderJourney(); showOnly("screen-journey"); }
}

/* ==========================================================
   RESET
   ========================================================== */
document.getElementById("resetBtn").addEventListener("click", ()=>{
  const ok = confirm(t("resetConfirmTitle")+"\n\n"+t("resetConfirmBody"));
  if(ok){
    progress = defaultProgress();
    saveProgress();
    updateProgressBar();
    lastScreen = "tutorial";
    renderTutorial();
    showOnly("screen-tutorial");
    setLiveStatus(lang==="ar" ? "تم إعادة ضبط التقدم" : "Progress has been reset");
  }
});

document.getElementById("reviewModelBtn").addEventListener("click", ()=>{
  lastScreen = "tutorial";
  renderTutorial(true);
  showOnly("screen-tutorial");
});

/* ==========================================================
   TUTORIAL RENDERING (6 screens, internal step state)
   ========================================================== */
let tutStep = 1;
function renderTutorial(reviewMode){
  lastScreen = "tutorial";
  tutStep = 1;
  renderTutorialStep(reviewMode);
}

function tutWrap(innerHtml, opts){
  opts = opts || {};
  const back = opts.hideBack ? "" :
    `<button type="button" class="btn btn-secondary" id="tutBackBtn">${t("tutorialBack")}</button>`;
  const nextLabel = opts.nextLabel || t("tutorialNext");
  const next = opts.hideNext ? "" :
    `<button type="button" class="btn btn-primary" id="tutNextBtn" ${opts.nextDisabled?"disabled":""}>${nextLabel}</button>`;
  return `
    <div class="card">
      <p style="color:var(--muted);font-size:0.82rem;font-weight:700;margin-bottom:4px;">
        ${t("tutorialProgress")} ${tutStep}/5
      </p>
      ${innerHtml}
      <div class="nav-row">${back}${next}</div>
    </div>`;
}

function renderTutorialStep(reviewMode){
  const host = document.getElementById("screen-tutorial");
  const isAr = lang === "ar";

  if(tutStep === 1){
    // Meet the model
    let stepsHtml = TUTORIAL_MODEL_STEPS.map((s,i)=>{
      return `<button type="button" class="model-step-btn ${s.cls}" data-step="${s.id}" aria-pressed="false">${(isAr?s.ar.label:s.en.label)}</button>${i<3?'<span class="model-arrow" aria-hidden="true">→</span>':''}`;
    }).join("");
    host.innerHTML = tutWrap(`
      <h2>Acknowledge → Bridge → Confirm → Close</h2>
      <p>${isAr?"دوس على كل خطوة عشان تشوف معناها ومثال عليها.":"Select each step to see its meaning, an example, a common mistake, and a tip."}</p>
      <div class="model-flow" id="modelFlow">${stepsHtml}</div>
      <div id="stepDetail" aria-live="polite"></div>
    `, {hideBack:true, nextDisabled:true});
    document.getElementById("modelFlow").addEventListener("click", (e)=>{
      const btn = e.target.closest(".model-step-btn");
      if(!btn) return;
      document.querySelectorAll(".model-step-btn").forEach(b=>b.setAttribute("aria-pressed", b===btn ? "true":"false"));
      const stepData = TUTORIAL_MODEL_STEPS.find(s=>s.id===btn.dataset.step);
      const d = isAr ? stepData.ar : stepData.en;
      document.getElementById("stepDetail").innerHTML = `
        <div class="step-detail">
          <dl>
            <dt>${isAr?"الموقف":"Context"}</dt><dd>${d.context}</dd>
            <dt>${isAr?"المعنى":"Meaning"}</dt><dd>${d.meaning}</dd>
            <dt>${isAr?"مثال":"Example"}</dt><dd>${d.example}</dd>
            <dt>${isAr?"خطأ شائع":"Common mistake"}</dt><dd>${d.mistake}</dd>
            <dt>${isAr?"نصيحة":"Tip"}</dt><dd>${d.tip}</dd>
          </dl>
        </div>`;
      document.getElementById("tutNextBtn").disabled = false;
    });
    bindTutNav(reviewMode);
    return;
  }

  if(tutStep === 2){
    const correctOrder = ["acknowledge","bridge","confirm","close"];
    const shuffled = ["bridge","close","acknowledge","confirm"];
    let built = [];
    let poolHtml = shuffled.map(id=>{
      const s = TUTORIAL_MODEL_STEPS.find(x=>x.id===id);
      return `<button type="button" class="order-choice" data-id="${id}">${isAr?s.ar.label:s.en.label}</button>`;
    }).join("");
    host.innerHTML = tutWrap(`
      <h2>${isAr?"رتب الخطوات":"Put the Steps in Order"}</h2>
      <p>${isAr?"دوس على الخطوات بالترتيب الصح من الاعتراف للختام.":"Click the steps in the correct order, from Acknowledge to Close."}</p>
      <div class="order-built" id="orderBuilt" aria-label="${isAr?"الترتيب الحالي":"Current order"}"></div>
      <div class="order-pool" id="orderPool">${poolHtml}</div>
      <div id="orderMsg" role="status" aria-live="polite"></div>
      <button type="button" class="btn btn-ghost" id="orderResetBtn" style="margin-top:8px;">${isAr?"ابدأ من جديد":"Start over"}</button>
    `, {hideNext:true});

    const builtEl = document.getElementById("orderBuilt");
    const poolEl = document.getElementById("orderPool");
    const msgEl = document.getElementById("orderMsg");

    function refreshBuilt(){
      builtEl.innerHTML = built.map(id=>{
        const s = TUTORIAL_MODEL_STEPS.find(x=>x.id===id);
        return `<span class="chip">${isAr?s.ar.label:s.en.label}</span>`;
      }).join("");
    }
    poolEl.addEventListener("click",(e)=>{
      const btn = e.target.closest(".order-choice");
      if(!btn || btn.disabled) return;
      built.push(btn.dataset.id);
      btn.disabled = true;
      btn.style.opacity = "0.35";
      refreshBuilt();
      if(built.length === 4){
        const isCorrect = built.every((id,i)=>id===correctOrder[i]);
        if(isCorrect){
          msgEl.textContent = isAr?"تمام! الترتيب صح.":"Correct! That's the right order.";
          msgEl.className = "feedback-box good";
          proceedTutorialAfterDelay();
        }else{
          msgEl.textContent = isAr?"مش الترتيب الصح، جرب تاني.":"Not quite the right order — try again.";
          msgEl.className = "feedback-box bad";
        }
      }
    });
    document.getElementById("orderResetBtn").addEventListener("click", ()=>{
      built = [];
      refreshBuilt();
      msgEl.textContent = "";
      msgEl.className = "";
      poolEl.querySelectorAll("button").forEach(b=>{b.disabled=false; b.style.opacity="1";});
    });
    function proceedTutorialAfterDelay(){
      const nextBtn = document.createElement("button");
      nextBtn.type = "button";
      nextBtn.className = "btn btn-primary";
      nextBtn.textContent = t("tutorialNext");
      nextBtn.style.marginTop = "10px";
      nextBtn.addEventListener("click", ()=>{ tutStep++; renderTutorialStep(reviewMode); });
      msgEl.after(nextBtn);
    }
    bindBackOnly(reviewMode);
    return;
  }

  if(tutStep === 3){
    let idx = 0;
    let correctCount = 0;
    host.innerHTML = tutWrap(`
      <h2>${isAr?"ده بيوسّع المحادثة ولا لأ؟":"Does This Extend the Conversation?"}</h2>
      <p id="classifyContext" style="color:var(--muted);font-size:0.85rem;"></p>
      <p id="classifyPrompt"></p>
      <div class="option-list" id="classifyOptions">
        <button type="button" class="option-btn" data-choice="ack">${isAr?"اعتراف من غير توسيع":"Acknowledges without extending"}</button>
        <button type="button" class="option-btn" data-choice="ext">${isAr?"بيشجع على الاستمرار":"Encourages the conversation"}</button>
      </div>
      <div id="classifyMsg"></div>
    `, {hideNext:true});
    function loadItem(){
      if(idx >= TUTORIAL_CLASSIFY.length){
        const nextBtn = document.createElement("button");
        nextBtn.type="button"; nextBtn.className="btn btn-primary"; nextBtn.style.marginTop="10px";
        nextBtn.textContent = t("tutorialNext");
        nextBtn.addEventListener("click", ()=>{ tutStep++; renderTutorialStep(reviewMode); });
        document.getElementById("classifyMsg").after(nextBtn);
        document.getElementById("classifyContext").textContent = "";
        document.getElementById("classifyPrompt").textContent = isAr?`خلصت! (${correctCount}/${TUTORIAL_CLASSIFY.length} صح)`:`Done! (${correctCount}/${TUTORIAL_CLASSIFY.length} correct)`;
        document.getElementById("classifyOptions").classList.add("hidden");
        return;
      }
      const item = TUTORIAL_CLASSIFY[idx];
      document.getElementById("classifyContext").textContent = (isAr?"الموقف: ":"Context: ") + (isAr?item.context.ar:item.context.en);
      document.getElementById("classifyPrompt").textContent = isAr?item.ar:item.en;
      document.getElementById("classifyMsg").textContent = "";
      document.getElementById("classifyMsg").className = "";
      document.querySelectorAll("#classifyOptions .option-btn").forEach(b=>{b.disabled=false; b.className="option-btn";});
    }
    document.getElementById("classifyOptions").addEventListener("click",(e)=>{
      const btn = e.target.closest(".option-btn");
      if(!btn || btn.disabled) return;
      document.querySelectorAll("#classifyOptions .option-btn").forEach(b=>b.disabled=true);
      const item = TUTORIAL_CLASSIFY[idx];
      const correct = btn.dataset.choice === item.correct;
      btn.classList.add(correct?"selected-correct":"selected-incorrect");
      if(correct) correctCount++;
      const msg = document.getElementById("classifyMsg");
      msg.textContent = correct ? (isAr?"صح!":"Correct!") : (isAr?"مش تمامًا — راجع المثال تاني.":"Not quite — review the example again.");
      msg.className = "feedback-box " + (correct?"good":"bad");
      idx++;
      setTimeout(loadItem, 1100);
    });
    loadItem();
    bindBackOnly(reviewMode);
    return;
  }

  if(tutStep === 4){
    const data = isAr ? TUTORIAL_BUILD.ar : TUTORIAL_BUILD.en;
    let chosen = [null,null,null,null];
    let groupsHtml = data.groups.map((g,gi)=>{
      let optsHtml = g.options.map((o,oi)=>`<button type="button" class="order-choice" data-g="${gi}" data-o="${oi}">${o}</button>`).join("");
      return `<div style="margin-bottom:14px;"><h3>${g.label}</h3><div class="order-pool">${optsHtml}</div></div>`;
    }).join("");
    host.innerHTML = tutWrap(`
      <h2>${isAr?"ابنِ الختام":"Build the Closing"}</h2>
      <p>${isAr?"اختار جملة واحدة من كل مجموعة.":"Choose one fragment from each group."}</p>
      ${groupsHtml}
      <div class="step-detail hidden" id="buildPreview"></div>
    `, {nextDisabled:true});
    host.querySelectorAll(".order-pool button").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const gi = Number(btn.dataset.g), oi = Number(btn.dataset.o);
        chosen[gi] = data.groups[gi].options[oi];
        const groupDiv = btn.closest("div").parentElement;
        groupDiv.querySelectorAll("button").forEach(b=>b.setAttribute("aria-pressed", b===btn?"true":"false"));
        groupDiv.querySelectorAll("button").forEach(b=>b.style.background = b===btn ? "var(--navy)" : "var(--paper)");
        groupDiv.querySelectorAll("button").forEach(b=>b.style.color = b===btn ? "#fff" : "var(--ink)");
        if(chosen.every(c=>c)){
          const preview = document.getElementById("buildPreview");
          preview.classList.remove("hidden");
          preview.innerHTML = `<strong>${isAr?"معاينة:":"Preview:"}</strong><br>${chosen.join(" ")}`;
          document.getElementById("tutNextBtn").disabled = false;
        }
      });
    });
    bindTutNav(reviewMode);
    return;
  }

  if(tutStep === 5){
    const data = isAr ? TUTORIAL_FIRM.ar : TUTORIAL_FIRM.en;
    let optsHtml = data.options.map((o,i)=>`<button type="button" class="option-btn" data-i="${i}">${o}</button>`).join("");
    host.innerHTML = tutWrap(`
      <h2>Brief Acknowledgement → Clear Boundary → Final Close</h2>
      <div class="customer-line">${data.customer}</div>
      <p><strong>${isAr?"الموظف:":"Employee:"}</strong> ${data.employee}</p>
      <p>${data.question}</p>
      <div class="option-list" id="firmOptions">${optsHtml}</div>
      <div id="firmMsg"></div>
    `, {nextLabel: reviewMode ? t("backToJourney") : t("startJourney"), nextDisabled:true});
    document.getElementById("firmOptions").addEventListener("click",(e)=>{
      const btn = e.target.closest(".option-btn");
      if(!btn || btn.disabled) return;
      document.querySelectorAll("#firmOptions .option-btn").forEach(b=>b.disabled=true);
      const correct = Number(btn.dataset.i) === data.correct;
      btn.classList.add(correct?"selected-correct":"selected-incorrect");
      document.getElementById("firmMsg").innerHTML =
        `<div class="feedback-box ${correct?"good":"bad"}">${isAr?"صحيح: الرد بيعترف بالعميل، بيدي سبب واضح، وبيقفل بثقة — الحزم هنا مش قلة أدب.":"Right idea: the response recognizes the customer, gives a clear reason, and closes with confidence — assertiveness here is not rudeness."}</div>`;
      document.getElementById("tutNextBtn").disabled = false;
    });
    document.getElementById("tutNextBtn2Placeholder") // no-op guard
    bindTutNavFinal(reviewMode);
    return;
  }
}

function bindTutNav(reviewMode){
  const nextBtn = document.getElementById("tutNextBtn");
  if(nextBtn) nextBtn.addEventListener("click", ()=>{ tutStep++; renderTutorialStep(reviewMode); });
  const backBtn = document.getElementById("tutBackBtn");
  if(backBtn) backBtn.addEventListener("click", ()=>{ tutStep = Math.max(1,tutStep-1); renderTutorialStep(reviewMode); });
}
function bindBackOnly(reviewMode){
  const backBtn = document.getElementById("tutBackBtn");
  if(backBtn) backBtn.addEventListener("click", ()=>{ tutStep = Math.max(1,tutStep-1); renderTutorialStep(reviewMode); });
}
function bindTutNavFinal(reviewMode){
  const backBtn = document.getElementById("tutBackBtn");
  if(backBtn) backBtn.addEventListener("click", ()=>{ tutStep = Math.max(1,tutStep-1); renderTutorialStep(reviewMode); });
  const nextBtn = document.getElementById("tutNextBtn");
  if(nextBtn) nextBtn.addEventListener("click", ()=>{
    if(reviewMode){
      renderJourney(); lastScreen="journey"; showOnly("screen-journey");
    } else {
      progress.tutorialDone = true;
      saveProgress();
      renderJourney(); lastScreen="journey"; showOnly("screen-journey");
    }
  });
}

/* ==========================================================
   JOURNEY SCREEN
   ========================================================== */
function renderJourney(){
  lastScreen = "journey";
  const isAr = lang === "ar";
  document.getElementById("journeyTitle").textContent = t("journeyTitle");
  document.getElementById("journeySub").textContent = t("journeySub");
  document.getElementById("reviewModelBtn").textContent = t("reviewModel");
  const grid = document.getElementById("journeyGrid");
  grid.innerHTML = SCENARIOS.map((sc,i)=>{
    const done = !!progress.completedScenarios[sc.id];
    const channelLabel = sc.channel === "phone" ? t("phone") : t("faceToFace");
    return `
      <div class="scenario-card ${done?'completed':''}">
        <span class="tag">${done ? "✓ "+t("completed") : (i+1)+". "+t("notStarted")}</span>
        <h3>${isAr?sc.title.ar:sc.title.en}</h3>
        <p style="color:var(--muted);font-size:0.85rem;margin:0;">${channelLabel}</p>
        <button type="button" class="btn ${done?'btn-secondary':'btn-primary'}" data-sc="${sc.id}">
          ${done ? t("replay") : t("start")}

  }).join("");

/* ==========================================================
   SCENARIO PLAYER
   ========================================================== */
let currentScenario = null;
let currentDecisionIndex = 0;
let scenarioSessionFirstAttempt = {};   // decisionId -> quality (this play session)
let scenarioSessionImproved = {};       // decisionId -> true

function startScenario(scId){
  lastScreen = "scenario";
  lastScenarioId = scId;
  currentScenario = SCENARIOS.find(s=>s.id===scId);
  currentDecisionIndex = 0;
  scenarioSessionFirstAttempt = {};
  scenarioSessionImproved = {};
  renderDecision();
  showOnly("screen-scenario");
}

function renderDecision(){
  const isAr = lang === "ar";
  const sc = currentScenario;
  const decision = sc.decisions[currentDecisionIndex];
  const host = document.getElementById("screen-scenario");
  const channelLabel = sc.channel === "phone" ? t("phone") : t("faceToFace");
  const channelCls = sc.channel === "phone" ? "channel-phone" : "channel-face";
  const channelIcon = sc.channel === "phone" ? "☎" : "🧑‍💼";

  let optsHtml = decision.options.map((opt,oi)=>{
    return `<button type="button" class="option-btn" data-oi="${oi}">${isAr?opt.text.ar:opt.text.en}</button>`;
  }).join("");

  host.innerHTML = `
    <div class="card">
      <span class="channel-badge ${channelCls}">${channelIcon} ${channelLabel}</span>
      <h2>${isAr?sc.title.ar:sc.title.en}</h2>
      <p><strong>${t("situation")}:</strong> ${isAr?sc.situation.ar:sc.situation.en}</p>
      ${currentDecisionIndex === 0 ? `<div class="customer-line">${isAr?sc.customerOpening.ar:sc.customerOpening.en}</div>` : ""}
      <p style="color:var(--muted);font-size:0.85rem;">${t("customerSays")} ${(isAr?decision.prompt.ar:decision.prompt.en)}</p>
      <h3>${t("yourResponse")}</h3>
      <div class="option-list" id="decisionOptions">${optsHtml}</div>
      <div id="decisionFeedback"></div>
    </div>
  `;

  document.getElementById("decisionOptions").addEventListener("click", (e)=>{
    const btn = e.target.closest(".option-btn");
    if(!btn) return;
    handleDecisionChoice(decision, Number(btn.dataset.oi));
  }, { once:false });
}

function directionLabel(quality, isLast){
  const map = {
    strong: { en: isLast ? "Successfully Closed" : "Ready to Close", ar: isLast ? "تم الإغلاق بنجاح" : "جاهز للختام", cls:"dir-good" },
    partial:{ en: isLast ? "Closing Signal Missed" : "Partly Redirected", ar: isLast ? "إشارة الختام اتفوتت" : "اتوجه جزئيًا", cls:"dir-mid" },
    risky:  { en: isLast ? "Boundary Needed" : "Conversation Extending", ar: isLast ? "محتاج حد واضح" : "المحادثة بتتوسع", cls:"dir-bad" }
  };
  return map[quality];
}

let retryUsed = {}; // decisionId -> bool (has already retried once)

function handleDecisionChoice(decision, oi){
  const isAr = lang === "ar";
  const sc = currentScenario;
  const opt = decision.options[oi];
  const isLastDecision = currentDecisionIndex === sc.decisions.length - 1;

  // record first attempt only once per decision per session
  if(!(decision.id in scenarioSessionFirstAttempt)){
    scenarioSessionFirstAttempt[decision.id] = opt.q;
    if(!(decision.id in progress.firstAttempts)){
      progress.firstAttempts[decision.id] = opt.q;
      saveProgress();
    }
  } else if(opt.q === "strong"){
    // improved after retry
    scenarioSessionImproved[decision.id] = true;
    progress.improvedAfterRetry[decision.id] = true;
    saveProgress();
  }

  document.querySelectorAll("#decisionOptions .option-btn").forEach((b,i)=>{
    b.disabled = true;
    if(i===oi) b.classList.add(opt.q==="strong"?"selected-correct":"selected-incorrect");
  });

  const dir = directionLabel(opt.q, isLastDecision);
  let feedbackHtml = `<div class="direction-indicator ${dir.cls}">${isAr?dir.ar:dir.en}</div>`;
  const f = opt.feedback;

  if(opt.q === "strong"){
    feedbackHtml += `
      <div class="feedback-box good">
        <p><strong>${isAr?"رد فعل العميل: ":"Customer reaction: "}</strong>${isAr?f.customerReaction.ar:f.customerReaction.en}</p>
        <p>${isAr?f.coaching.ar:f.coaching.en}</p>
      </div>`;
  } else if(opt.q === "partial"){
    feedbackHtml += `
      <div class="feedback-box bad">
        <p><strong>${isAr?"اللي نجح: ":"What worked: "}</strong>${isAr?f.whatWorked.ar:f.whatWorked.en}</p>
        <p><strong>${isAr?"اللي وسّع أو ضعّف الختام: ":"What extended or weakened the close: "}</strong>${isAr?f.whatWeakened.ar:f.whatWeakened.en}</p>
        <p><strong>${isAr?"طريقة أقوى: ":"A stronger approach: "}</strong>${isAr?f.stronger.ar:f.stronger.en}</p>
      </div>`;
  } else {
    feedbackHtml += `
      <div class="feedback-box bad">
        <p><strong>${isAr?"ليه بدت مقبولة الأول: ":"Why it sounded acceptable at first: "}</strong>${isAr?f.whyAcceptable.ar:f.whyAcceptable.en}</p>
        <p><strong>${isAr?"الخطر: ":"The risk: "}</strong>${isAr?f.risk.ar:f.risk.en}</p>
        <p><strong>${isAr?"التأثير على العميل: ":"Effect on the customer: "}</strong>${isAr?f.effect.ar:f.effect.en}</p>
        <p><strong>${isAr?"الخطوة الناقصة: ":"Model step missing: "}</strong>${isAr?f.missingStep.ar:f.missingStep.en}</p>
      </div>`;
  }

  const canRetry = opt.q !== "strong" && !retryUsed[decision.id];
  let navHtml = `<div class="nav-row">`;
  if(canRetry){
    navHtml += `<button type="button" class="btn btn-secondary" id="retryBtn">${t("tryAgain")}</button>`;
  }
  navHtml += `<button type="button" class="btn btn-primary" id="advanceBtn">
      ${isLastDecision ? t("seeResults") : t("continueBtn")}
    </button></div>`;
  feedbackHtml += navHtml;

  document.getElementById("decisionFeedback").innerHTML = feedbackHtml;
  setLiveStatus((isAr?dir.ar:dir.en));

  const retryBtn = document.getElementById("retryBtn");
  if(retryBtn){
    retryBtn.addEventListener("click", ()=>{
      retryUsed[decision.id] = true;
      renderDecision();
    });
  }
  document.getElementById("advanceBtn").addEventListener("click", ()=>{
    if(isLastDecision){
      finishScenario();
    } else {
      currentDecisionIndex++;
      renderDecision();
    }
  });
}

function finishScenario(){
  const sc = currentScenario;
  const wasAlreadyDone = !!progress.completedScenarios[sc.id];
  progress.completedScenarios[sc.id] = true;

  let strongFirst = 0, improved = 0;
  sc.decisions.forEach(d=>{
    if(scenarioSessionFirstAttempt[d.id] === "strong") strongFirst++;
    if(scenarioSessionImproved[d.id]) improved++;
  });
  progress.scenarioScores[sc.id] = { firstAttemptStrong: strongFirst, improved: improved, total: sc.decisions.length };
  saveProgress();
  updateProgressBar();
  renderScenarioResult(strongFirst, improved, sc.decisions.length, wasAlreadyDone);
  showOnly("screen-scenario-result");
}

function renderScenarioResult(strongFirst, improved, total, wasReplay){
  const isAr = lang === "ar";
  const sc = currentScenario;
  const host = document.getElementById("screen-scenario-result");

  let perfLine, reinforceLine;
  if(strongFirst === total){
    perfLine = isAr ? `${total} من ${total} قرارات قوية من أول محاولة.` : `${total} of ${total} strong decisions on your first attempt.`;
    reinforceLine = isAr ? "حافظتِ على الدفء وفي نفس الوقت أديتِ للعميل إشارة ختام واضحة." : "You kept the interaction warm while giving the customer a clear closing signal.";
  } else if(strongFirst === 0){
    perfLine = isAr ? `0 من ${total} قرارات قوية من أول محاولة — وده طبيعي في أول تجربة.` : `0 of ${total} strong decisions on your first attempt — that's a normal part of first practice.`;
    reinforceLine = isAr ? "التغذية الراجعة اللي شفتها دلوقتي هي الجزء الأهم من التمرين." : "The feedback you just saw is the most useful part of the practice.";
  } else {
    perfLine = isAr ? `${strongFirst} من ${total} قرارات قوية من أول محاولة.` : `${strongFirst} of ${total} strong decisions on your first attempt.`;
    reinforceLine = isAr ? "شوية قرارات احتاجت تعديل، وده جزء طبيعي من بناء المهارة دي." : "A few decisions needed adjusting — that's a normal part of building this skill.";
  }
  const insightLine = isAr ? "استمري تستخدمي أسئلة محددة ومرتبطة بالخدمة بدل الأسئلة المفتوحة." : "Keep using narrow, service-related questions instead of broad, open invitations.";

  host.innerHTML = `
    <div class="card">
      <h2>${isAr?sc.title.ar:sc.title.en}</h2>
      <div class="summary-stats">
        <div class="stat-box"><div class="num">${strongFirst}/${total}</div><div class="lbl">${t("firstAttempt")}</div></div>
        <div class="stat-box"><div class="num">${improved}</div><div class="lbl">${t("improved")}</div></div>
      </div>
      <p>${perfLine}</p>
      <p>${reinforceLine}</p>
      <p style="color:var(--muted);"><strong>${t("insight")}:</strong> ${insightLine}</p>
      <div class="nav-row">
        <button type="button" class="btn btn-secondary" id="backToJourneyBtn">${t("backToJourney")}</button>
        ${completedCount() >= 6 ? `<button type="button" class="btn btn-primary" id="toFinalBtn">${t("finalTitle")}</button>` : ""}
      </div>
    </div>
  `;
  document.getElementById("backToJourneyBtn").addEventListener("click", ()=>{ renderJourney(); lastScreen="journey"; showOnly("screen-journey"); });
  const toFinal = document.getElementById("toFinalBtn");
  if(toFinal) toFinal.addEventListener("click", ()=>{ renderFinal(); lastScreen="final"; showOnly("screen-final"); });
}

/* ==========================================================
   FINAL RESULTS / CAPABILITY PROFILE
   ========================================================== */
const CAPABILITIES = ["acknowledge","bridge","confirm","close","assertive"];

function computeCapabilityScores(){
  const sums = {}, counts = {};
  CAPABILITIES.forEach(c=>{ sums[c]=0; counts[c]=0; });
  SCENARIOS.forEach(sc=>{
    sc.decisions.forEach(d=>{
      const attempt = progress.firstAttempts[d.id];
      if(attempt){
        sums[d.capability] += SCORE[attempt];
        counts[d.capability] += 1;
      }
    });
  });
  const avg = {};
  CAPABILITIES.forEach(c=>{
    avg[c] = counts[c] ? (sums[c]/counts[c]) : null;
  });
  return avg;
}

function capabilityTag(avg){
  if(avg === null) return null;
  if(avg >= CAP_THRESHOLD_STRONG) return "strong";
  if(avg >= CAP_THRESHOLD_DEV) return "dev";
  return "needs";
}

function renderFinal(){
  const isAr = lang === "ar";
  const host = document.getElementById("screen-final");
  const avg = computeCapabilityScores();
  const tags = {};
  CAPABILITIES.forEach(c=>{ tags[c] = capabilityTag(avg[c]); });

  let strongestCap = null, priorityCap = null, bestAvg = -1, worstAvg = 99;
  CAPABILITIES.forEach(c=>{
    if(avg[c] !== null){
      if(avg[c] > bestAvg){ bestAvg = avg[c]; strongestCap = c; }
      if(avg[c] < worstAvg){ worstAvg = avg[c]; priorityCap = c; }
    }
  });

  let totalStrong = 0, totalImproved = 0;
  Object.values(progress.firstAttempts).forEach(q=>{ if(q==="strong") totalStrong++; });
  totalImproved = Object.keys(progress.improvedAfterRetry).length;

  const tagClass = {strong:"tag-strong", dev:"tag-dev", needs:"tag-needs"};
  const tagText = {strong:t("capStrong"), dev:t("capDev"), needs:t("capNeeds")};

  let rowsHtml = CAPABILITIES.map(c=>{
    const tag = tags[c];
    return `
      <div class="capability-row">
        <span class="capability-label">${capLabel(c)}</span>
        ${tag ? `<span class="capability-tag ${tagClass[tag]}">${tagText[tag]}</span>` : `<span class="capability-tag">—</span>`}
      </div>`;
  }).join("");

  host.innerHTML = `
    <div class="card">
      <h2>${t("finalTitle")}</h2>
      <div class="summary-stats">
        <div class="stat-box"><div class="num">${totalStrong}</div><div class="lbl">${t("finalStrongDecisions")}</div></div>
        <div class="stat-box"><div class="num">${totalImproved}</div><div class="lbl">${t("finalImproved")}</div></div>
      </div>
      <div style="margin:16px 0;">${rowsHtml}</div>
      <p><strong>${t("finalStrongest")}:</strong> ${strongestCap ? capLabel(strongestCap) : "—"}</p>
      <p><strong>${t("finalPriority")}:</strong> ${priorityCap ? capLabel(priorityCap) : "—"}</p>
      <div class="feedback-box good" style="margin-top:14px;">${t("finalTakeaway")}</div>
      <div class="nav-row">
        <button type="button" class="btn btn-secondary" id="finalReviewBtn">${t("reviewModelBtn")}</button>
        <button type="button" class="btn btn-secondary" id="finalReplayBtn">${t("replayScenario")}</button>
        <button type="button" class="btn btn-ghost" id="finalResetBtn">${t("resetProgress")}</button>
      </div>
    </div>
  `;
  document.getElementById("finalReviewBtn").addEventListener("click", ()=>{ renderTutorial(true); lastScreen="tutorial"; showOnly("screen-tutorial"); });
  document.getElementById("finalReplayBtn").addEventListener("click", ()=>{ renderJourney(); lastScreen="journey"; showOnly("screen-journey"); });
  document.getElementById("finalResetBtn").addEventListener("click", ()=>{ document.getElementById("resetBtn").click(); });
}

/* ==========================================================
   DEV-ONLY: CHOICE-LENGTH BALANCE AUDIT
   Run validateChoiceBalance() in the browser console for QA.
   Not exposed in the learner UI.
   ========================================================== */
function wordCount(str){ return str.trim().split(/\s+/).filter(Boolean).length; }
function arVisibleLength(str){ return str.replace(/[\u0610-\u061A\u064B-\u065F\u06D6-\u06ED]/g,"").trim().length; }

window.validateChoiceBalance = function(){
  const report = [];
  SCENARIOS.forEach(sc=>{
    sc.decisions.forEach(d=>{
      const enLens = d.options.map(o=>wordCount(o.text.en));
      const arLens = d.options.map(o=>arVisibleLength(o.text.ar));
      const enMax = Math.max(...enLens), enMin = Math.min(...enLens);
      const arMax = Math.max(...arLens), arMin = Math.min(...arLens);
      const enDiffPct = enMin ? Math.round(((enMax-enMin)/enMin)*100) : 0;
      const arDiffPct = arMin ? Math.round(((arMax-arMin)/arMin)*100) : 0;
      const strongIdx = d.options.findIndex(o=>o.q==="strong");
      const strongIsLongestEn = enLens[strongIdx] === enMax;
      const strongIsLongestAr = arLens[strongIdx] === arMax;
      report.push({
        scenario: sc.id, decision: d.id,
        en_word_counts: enLens, en_diff_pct: enDiffPct,
        ar_visible_lengths: arLens, ar_diff_pct: arDiffPct,
        strong_is_longest_en: strongIsLongestEn,
        strong_is_longest_ar: strongIsLongestAr,
        flag_en: enDiffPct > 40,
        flag_ar: arDiffPct > 40
      });
    });
  });
  console.table(report);
  const flagged = report.filter(r=>r.flag_en || r.flag_ar);
  if(flagged.length){
    console.warn("Decisions exceeding the preferred balance threshold:", flagged);
  } else {
    console.log("All decisions within preferred choice-length balance.");
  }
  return report;
};

})();
